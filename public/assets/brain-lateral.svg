<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" width="640" height="480">
  <!-- Lateral brain (left = frontal). Textbook-style; lobe paths used for hit/highlight. -->
  <defs>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7dcc8"/>
      <stop offset="50%" stop-color="#e8b896"/>
      <stop offset="100%" stop-color="#d49872"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#000" flood-opacity="0.16"/>
    </filter>
    <!-- Shared cerebrum silhouette for clip -->
    <clipPath id="cerebrumClip">
      <path d="M118,210
        C108,170 122,118 168,88
        C220,52 290,42 360,48
        C430,54 500,78 540,120
        C568,150 580,190 572,230
        C566,260 548,285 520,298
        C500,308 478,308 458,300
        C448,320 420,345 380,355
        C350,362 320,352 300,335
        C270,350 220,345 180,320
        C150,300 128,260 118,210 Z"/>
    </clipPath>
  </defs>

  <g filter="url(#softShadow)">
    <!-- Base cerebrum -->
    <path
      d="M118,210
         C108,170 122,118 168,88
         C220,52 290,42 360,48
         C430,54 500,78 540,120
         C568,150 580,190 572,230
         C566,260 548,285 520,298
         C500,308 478,308 458,300
         C448,320 420,345 380,355
         C350,362 320,352 300,335
         C270,350 220,345 180,320
         C150,300 128,260 118,210 Z"
      fill="url(#skin)"
      stroke="#5a3b2a"
      stroke-width="2.4"
      stroke-linejoin="round"
    />

    <!-- Cerebellum -->
    <path
      id="cerebellum"
      d="M430,300
         C455,292 495,300 520,330
         C538,352 540,385 520,408
         C498,430 460,435 430,420
         C405,408 390,380 392,350
         C394,325 408,308 430,300 Z"
      fill="#d9a088"
      stroke="#5a3b2a"
      stroke-width="2.2"
      stroke-linejoin="round"
    />

    <!-- Brain stem -->
    <path
      id="brainstem"
      d="M360,340
         C385,335 405,350 410,380
         C414,410 405,445 390,460
         C370,472 350,460 345,430
         C340,400 345,355 360,340 Z"
      fill="#dea88a"
      stroke="#5a3b2a"
      stroke-width="2.2"
      stroke-linejoin="round"
    />
  </g>

  <!-- Gyri / sulci (drawn over fills, under highlights) -->
  <g fill="none" stroke="#8a5a40" stroke-width="1.35" stroke-linecap="round" opacity="0.42">
    <path d="M160,150 C200,130 250,145 290,140"/>
    <path d="M180,190 C230,170 280,185 330,175"/>
    <path d="M200,230 C250,215 300,230 340,220"/>
    <path d="M320,100 C360,95 410,110 450,105"/>
    <path d="M360,150 C400,140 450,160 490,155"/>
    <path d="M380,200 C430,190 480,210 510,205"/>
    <path d="M220,270 C270,255 320,275 360,270"/>
    <path d="M210,210 C280,205 350,230 400,255" stroke-width="1.85" opacity="0.55"/>
    <path d="M330,90 C340,140 335,190 320,240" stroke-width="1.7" opacity="0.5"/>
    <path d="M445,330 C470,325 500,340 515,360"/>
    <path d="M440,355 C470,350 500,365 515,385"/>
    <path d="M438,380 C465,375 490,390 505,405"/>
  </g>
</svg>
